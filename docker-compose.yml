services:
  db:
    image: mysql:8.0
    container_name: rms-mysql-compose
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: pass
      MYSQL_DATABASE: cafe_restaurant_management
      # Optional: avoid auth edge cases
      # MYSQL_AUTHENTICATION_PLUGIN: mysql_native_password
    ports:
      # Avoid conflict with any existing mysql container on host port 3306
      - "3307:3306"
    volumes:
      # Init schema on first startup
      - ./database/cafe_user_auth_role_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./database/mysql_rest_core_schema.sql:/docker-entrypoint-initdb.d/02-rest-core-schema.sql:ro
      - ./database/stock_movements_schema.sql:/docker-entrypoint-initdb.d/03-stock-movements.sql:ro
      - ./database/mysql_auth_admin_seed.sql:/docker-entrypoint-initdb.d/04-admin-seed.sql:ro
      - rms_db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppass"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: rms-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 5000
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: pass
      DB_NAME: cafe_restaurant_management
      JWT_SECRET: change_me
      JWT_EXPIRES_IN: 24h
      NODE_ENV: development
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
    container_name: rms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  rms_db_data:


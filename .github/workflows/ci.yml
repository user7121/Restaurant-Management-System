name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Kodu çek
        uses: actions/checkout@v3

      - name: Docker build
        run: docker-compose build

      - name: Container çalıştır
        run: docker-compose up -d

      - name: Kontrol et
        run: docker ps

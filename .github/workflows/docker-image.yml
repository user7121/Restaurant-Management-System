name: CI/CD Pipeline — Restaurant Management System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Backend Lint & Test
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: rms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptestpass"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run ESLint
        working-directory: backend
        run: npx eslint . --ext .js --max-warnings 0
        continue-on-error: true

      - name: Wait for MySQL
        run: |
          until mysqladmin ping -h 127.0.0.1 -ptestpass --silent; do
            echo "Waiting for MySQL..."; sleep 2;
          done

      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test < database/cafe_user_auth_role_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test < database/mysql_rest_core_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test < database/stock_movements_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test < database/mysql_auth_admin_seed.sql

      - name: Run backend tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: rms_test
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 1h
        run: npm test --if-present

  # ──────────────────────────────────────────────
  # JOB 2 — Frontend Lint & Build
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src --ext .js,.jsx --max-warnings 0
        continue-on-error: true

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3 — Docker Build & Push
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 4 — Integration Test (docker-compose up)
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration — Full Stack Health Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start full stack with docker-compose
        run: docker compose up -d --build

      - name: Wait for services to become healthy
        run: |
          echo "Waiting for backend health endpoint..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"; exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 3s..."
            sleep 3
          done
          echo "ERROR: Backend did not become healthy in time"
          docker compose logs backend
          exit 1

      - name: Verify API health endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true'

      - name: Verify frontend is served
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173)
          echo "Frontend HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ]

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────
  # JOB 5 — Pipeline Summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, integration-test]
    if: always()

    steps:
      - name: Report pipeline status
        run: |
          echo "========================================"
          echo "  Restaurant Management System — CI/CD"
          echo "========================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Author  : ${{ github.actor }}"
          echo "  Status  : ${{ job.status }}"
          echo "========================================"

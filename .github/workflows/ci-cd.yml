name: CI/CD Pipeline — Restaurant Management System

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  IMAGE_NAME_LOWER: ${{ github.repository }}

jobs:
  # ──────────────────────────────────────────────
  # JOB 1 — Backend Lint & Test
  # ──────────────────────────────────────────────
  backend-test:
    name: Backend — Lint & Unit Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: rms_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -ptestpass"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run ESLint
        working-directory: backend
        run: npx eslint . --ext .js
        continue-on-error: true

      - name: Wait for MySQL to be ready
        run: |
          echo "Waiting for MySQL..."
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -ptestpass --silent 2>/dev/null; then
              echo "MySQL is ready!"
              exit 0
            fi
            echo "Attempt $i/30 — retrying in 2s..."
            sleep 2
          done
          echo "ERROR: MySQL did not become ready in time."
          exit 1

      - name: Seed test database
        run: |
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test \
            < database/cafe_user_auth_role_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test \
            < database/mysql_rest_core_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test \
            < database/stock_movements_schema.sql
          mysql -h 127.0.0.1 -uroot -ptestpass rms_test \
            < database/mysql_auth_admin_seed.sql

      - name: Smoke-test health endpoint
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 5000
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: rms_test
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 1h
          ALLOWED_ORIGINS: http://localhost:5173
        run: |
          node server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"

          # Wait for server to start
          for i in $(seq 1 15); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Server is healthy (HTTP 200)"
              break
            fi
            echo "Attempt $i/15 — status=$STATUS, retrying..."
            sleep 2
          done

          # Verify response body
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || { echo "ERROR: Health check failed"; kill $SERVER_PID; exit 1; }

          kill $SERVER_PID
          echo "Smoke test passed!"

      - name: Run unit tests
        working-directory: backend
        env:
          NODE_ENV: test
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: rms_test
          JWT_SECRET: ci_test_secret
          JWT_EXPIRES_IN: 1h
        run: npm test --if-present

  # ──────────────────────────────────────────────
  # JOB 2 — Frontend Lint & Build
  # ──────────────────────────────────────────────
  frontend-build:
    name: Frontend — Lint & Vite Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Run ESLint
        working-directory: frontend
        run: npx eslint src --ext .js,.jsx
        continue-on-error: true

      - name: Build production bundle
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:5000
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ──────────────────────────────────────────────
  # JOB 3 — Docker Build & Push (main branch only)
  # ──────────────────────────────────────────────
  docker-build:
    name: Docker — Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image name to lowercase
        id: image
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/user7121/restaurant-management-system/backend:latest
            ghcr.io/user7121/restaurant-management-system/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: true
          tags: |
            ghcr.io/user7121/restaurant-management-system/frontend:latest
            ghcr.io/user7121/restaurant-management-system/frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=http://localhost:5000
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # JOB 4 — Integration Test (docker compose up)
  # ──────────────────────────────────────────────
  integration-test:
    name: Integration — Full Stack Health Check
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start full stack with docker compose
        run: docker compose up -d --build

      - name: Wait for backend to become healthy
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health 2>/dev/null || true)
            if [ "$STATUS" = "200" ]; then
              echo "Backend is healthy (HTTP 200)"
              exit 0
            fi
            echo "Attempt $i/30 — status=$STATUS, retrying in 3s..."
            sleep 3
          done
          echo "ERROR: Backend did not become healthy in time."
          docker compose logs backend
          exit 1

      - name: Verify API health endpoint
        run: |
          RESPONSE=$(curl -s http://localhost:5000/api/health)
          echo "Health response: $RESPONSE"
          echo "$RESPONSE" | grep -q '"success":true' || \
            { echo "ERROR: Unexpected health response"; exit 1; }

      - name: Verify frontend container is running
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5173 2>/dev/null || true)
          echo "Frontend HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "304" ] || \
            { echo "ERROR: Frontend not responding (got $STATUS)"; exit 1; }

      - name: Print container logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────
  # JOB 5 — Pipeline Summary
  # ──────────────────────────────────────────────
  pipeline-summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, integration-test]
    if: always()

    steps:
      - name: Report pipeline result
        run: |
          echo "========================================"
          echo "  Restaurant Management System — CI/CD"
          echo "========================================"
          echo "  Branch  : ${{ github.ref_name }}"
          echo "  Commit  : ${{ github.sha }}"
          echo "  Actor   : ${{ github.actor }}"
          echo "  Event   : ${{ github.event_name }}"
          echo "  Backend : ${{ needs.backend-test.result }}"
          echo "  Frontend: ${{ needs.frontend-build.result }}"
          echo "  Integ   : ${{ needs.integration-test.result }}"
          echo "========================================"
